name: Validate

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  hacs:
    name: HACS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate with HACS
        uses: hacs/action@main
        with:
          category: integration
